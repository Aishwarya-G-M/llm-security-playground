# Banking LLM Attack Patterns
# Sources: OWASP AITG-APP-01, puppetry-detector (BSD-3)
# Targets: DBS, JPMorgan, Goldman Sachs, UBS, Morgan Stanley style LLM assistants

patterns:

  # --- Instruction Override ---
  - "ignore\\s+(all\\s+)?(previous|prior)\\s+instructions"
  - "disregard\\s+(all\\s+)?(previous|prior)\\s+(instructions|rules|guidelines)"
  - "forget\\s+(everything|all)\\s+(you\\s+)?(were\\s+)?(told|trained|instructed)"
  - "supersede\\s+(all\\s+)?previous\\s+(instructions|directives)"

  # --- System Prompt Leakage ---
  - "reveal\\s+(your\\s+)?(system\\s+prompt|internal\\s+instructions|configuration)"
  - "what\\s+(are|were)\\s+your\\s+(original\\s+)?(instructions|directives|rules)"
  - "show\\s+me\\s+(your\\s+)?(system\\s+prompt|base\\s+prompt|initial\\s+prompt)"
  - "repeat\\s+(everything|all)\\s+(above|before|previously)"

  # --- Privilege Escalation ---
  - "(elevate|escalate|promote)\\s+(my\\s+)?(privileges|permissions|access)"
  - "grant\\s+me\\s+(admin|root|superuser|manager)\\s+(access|privileges|rights)"
  - "you\\s+are\\s+now\\s+(an?\\s+)?(admin|superuser|root|bank\\s+manager|financial\\s+advisor)"
  - "act\\s+as\\s+(an?\\s+)?(authorized|privileged|admin|internal)\\s+(user|employee|staff)"

  # --- Financial Data Extraction ---
  - "reveal\\s+(all\\s+)?(customer|account|card)\\s+(details|numbers|data|records)"
  - "show\\s+(me\\s+)?(account\\s+balance|transaction\\s+history|credit\\s+score)"
  - "export\\s+(all\\s+)?(customer|financial|banking)\\s+(data|records|information)"
  - "(bypass|override)\\s+(transaction|payment|transfer)\\s+(limit|restriction|approval)"

  # --- Role Hijack / Jailbreak ---
  - "pretend\\s+(you\\s+are|to\\s+be)\\s+(a\\s+)?(hacker|attacker|rogue\\s+agent)"
  - "you\\s+are\\s+now\\s+DAN"
  - "act\\s+as\\s+if\\s+(you\\s+have\\s+)?(no\\s+)?(restrictions|rules|guidelines|limits)"
  - "imagine\\s+(you\\s+are|you're)\\s+(a\\s+)?(malicious|evil|unrestricted)\\s+(AI|assistant|bot)"