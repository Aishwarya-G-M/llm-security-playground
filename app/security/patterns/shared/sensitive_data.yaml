category: sensitive_data
patterns:
  - id: customer_data_request
    pattern: "show\\s+(me\\s+)?customer\\s+(data|records|details)"
    description: "Attempts to access customer data"
    severity: 9

  - id: credentials_extraction
    pattern: "reveal\\s+(account|card|token|password|secret|api\\s*key)\\s*(number|details|data|value)?"
    description: "Attempts to extract sensitive credentials or identifiers"
    severity: 10

  - id: bulk_data_dump
    pattern: "dump\\s+(all\\s+)?(user|customer|account)\\s+data"
    description: "Attempts bulk sensitive data extraction"
    severity: 10

  - id: pii_extraction
    pattern: "(ssn|social\\s*security|aadhaar|passport|tax\\s*id)\\s*(number|details)?"
    description: "Attempts to extract personally identifiable information"
    severity: 10

  - id: database_credentials_request
    pattern: "database\\s+(password|credentials|connection\\s*string)"
    description: "Attempts to retrieve database access credentials"
    severity: 10