# KYC & Identity Verification LLM Attack Patterns
# Sources: OWASP AITG-APP-01, puppetry-detector (BSD-3)
# Targets: Identity verification, onboarding, and KYC LLM assistants

patterns:

  # --- Synthetic Identity Fraud ---
  - "generate\\s+(a\\s+)?(fake|synthetic|fictional)\\s+(identity|passport|id|kyc|profile)"
  - "create\\s+(a\\s+)?(fake|synthetic|fictional)\\s+(customer|user|account|profile)"
  - "(fabricate|invent|forge)\\s+(a\\s+)?(identity|document|kyc\\s+record|passport|id)"
  - "help\\s+me\\s+(pass|bypass|fool|trick)\\s+(kyc|identity\\s+verification|id\\s+check)"

  # --- Identity Bypass ---
  - "(bypass|skip|override)\\s+(kyc|identity|verification|id\\s+check|background\\s+check)"
  - "(disable|turn\\s+off|deactivate)\\s+(identity|kyc|verification)\\s+(checks|process|system)"
  - "verify\\s+me\\s+(without|bypassing)\\s+(documents|checks|verification|proof)"
  - "(approve|whitelist)\\s+(my|this)\\s+(account|identity|profile)\\s+(without|bypassing)\\s+(verification|kyc|checks)"

  # --- PII Extraction ---
  - "(extract|export|retrieve|dump)\\s+(all\\s+)?(kyc|customer|user)\\s+(data|records|documents|details)"
  - "show\\s+(me\\s+)?(all\\s+)?(stored|saved)\\s+(kyc|identity|personal)\\s+(data|documents|records)"
  - "reveal\\s+(the\\s+)?(passport|national\\s+id|social\\s+security|tax\\s+id|date\\s+of\\s+birth)"
  - "(access|retrieve)\\s+(another|other|all)\\s+(customer|user)\\s+(kyc|identity|profile|records)"

  # --- Deepfake / Document Forgery ---
  - "(generate|create|make)\\s+(a\\s+)?(deepfake|fake\\s+photo|forged\\s+document|fake\\s+id)"
  - "how\\s+to\\s+(forge|fake|create\\s+a\\s+fake)\\s+(passport|id|document|kyc)"

  # --- Role Hijack / Jailbreak ---
  - "pretend\\s+(you\\s+are|to\\s+be)\\s+(a\\s+)?(kyc\\s+officer|compliance\\s+officer|identity\\s+verifier)"
  - "act\\s+as\\s+(an?\\s+)?(trusted|authorized|internal)\\s+(kyc|compliance|verification)\\s+(agent|officer|system)"
  - "you\\s+are\\s+now\\s+an?\\s+(unrestricted|unmonitored)\\s+(kyc|identity|compliance)\\s+(agent|system|bot)"

  # --- Multi-language / Obfuscation ---
  - "[A-Za-z0-9+/]{20,}={0,2}"
  - "(?:[0-9a-fA-F]{2}\\s*){8,}"